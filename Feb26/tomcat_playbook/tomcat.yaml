---
- name: install tomcat 10
  hosts: appserver
  become: yes
  tasks:
    - name: fail if it is not ubuntu
      ansible.builtin.fail:
        msg: This playbook is for Ubuntu only
      when:  ansible_facts['distribution'] != "Ubuntu"
    - name: install java
      ansible.builtin.apt:
        name: "{{ java_package_name }}"
        update_cache: yes
        state: present
    - name: create a tomcat group
      ansible.builtin.group:
        name: "{{ tomcat_group }}"
        state: present
    - name: create a tomcat group
      ansible.builtin.user:
        name: "{{ tomcat_user }}"
        create_home: yes
        group: "{{ tomcat_group }}"
        home: "{{ tomcat_home_dir }}"
        shell: "{{ tomcat_shell }}"